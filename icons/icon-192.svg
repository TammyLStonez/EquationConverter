<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111620"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="192" height="192" rx="38" fill="url(#bg)"/>

  <!-- Border -->
  <rect x="3" y="3" width="186" height="186" rx="35"
        fill="none" stroke="#00e5c3" stroke-width="3" opacity="0.85"/>

  <!-- Subtle inner glow ring -->
  <rect x="3" y="3" width="186" height="186" rx="35"
        fill="none" stroke="#00e5c3" stroke-width="10" opacity="0.06"/>

  <!-- ∑ symbol -->
  <text x="96" y="136"
        font-family="Georgia, 'Times New Roman', serif"
        font-size="110"
        font-weight="400"
        text-anchor="middle"
        fill="#00e5c3"
        filter="url(#glow)"
        opacity="0.95">∑</text>
</svg>
